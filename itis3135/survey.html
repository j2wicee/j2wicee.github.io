<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey ~ ITIS 3135</title>
    <link rel="stylesheet" href="styles/default.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&family=Oswald&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div data-include="components/header.html"></div>
    <main>
      <h2>Capable Mouse Fan Survey</h2>

      <form id="capable-mouse-survey">
        <label for="name">Name:</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required
        />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />

        <label for="product">Favorite Capable Mouse Gadget:</label>
        <select id="product" name="product" required>
          <option value="">Select one</option>
          <option value="cheese-cpu">Cheese CPU</option>
          <option value="nano-laptop">Nano Coding Laptop</option>
          <option value="crumb-tracker">Wireless Crumb Tracker</option>
          <option value="ai-cheese-analyzer">AI Cheese Analyzer</option>
        </select>

        <fieldset>
          <legend>Preferred Cheese for Gadgets:</legend>
          <label
            ><input type="radio" name="cheese" value="cheddar" required />
            Cheddar</label
          >
          <label
            ><input type="radio" name="cheese" value="gouda" /> Gouda</label
          >
          <label
            ><input type="radio" name="cheese" value="swiss" /> Swiss</label
          >
        </fieldset>

        <fieldset>
          <legend>Which gadgets would you like to see improved?</legend>
          <label
            ><input type="checkbox" name="improvements" value="cpu" /> Cheese
            CPU</label
          >
          <label
            ><input type="checkbox" name="improvements" value="laptop" /> Nano
            Laptop</label
          >
          <label
            ><input type="checkbox" name="improvements" value="tracker" /> Crumb
            Tracker</label
          >
          <label
            ><input type="checkbox" name="improvements" value="analyzer" /> AI
            Cheese Analyzer</label
          >
        </fieldset>

        <label for="comments">Additional Comments:</label>
        <textarea
          id="comments"
          name="comments"
          placeholder="Share your thoughts..."
        ></textarea>

        <button type="submit">Submit Survey</button>
      </form>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="scripts/include.min.js"></script>
  </body>
</html>
